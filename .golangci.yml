version: "2"

run:
  timeout: 5m
  tests: true

output:
  formats:
    text:
      path: stdout
      colors: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - gosec
    - revive
    - misspell
    - unconvert
    - prealloc
    - bodyclose
    - contextcheck
    - nilerr

  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
      - path: _test\.go
        linters:
          - errcheck
          - gocritic

formatters:
  enable:
    - gofumpt
    - gofmt
    - goimports

severity:
  default: warning

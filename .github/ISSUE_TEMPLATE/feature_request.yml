name: Feature request
description: Suggest an enhancement or new capability.
title: "feat: "
labels:
  - kind/feature
  - status/needs-triage
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? Who is affected?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like kafka-attic to behave?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why they fall short.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, related issues, cluster characteristics.

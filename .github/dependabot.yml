version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - kind/dependencies
      - area/dependencies
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - kind/dependencies
      - area/dependencies
    commit-message:
      prefix: ci
      include: scope

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - kind/dependencies
      - area/dependencies
    commit-message:
      prefix: docker
      include: scope
